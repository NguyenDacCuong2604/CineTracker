//
//  .swiftlint.yml
//  CineTracker
//
//  Created by MAC VN on 11/5/26.
//

included:
  - CineTracker
  - CineTrackerTests
  - CineTrackerUITests

excluded:
  - Carthage
  - Pods
  - DerivedData
  - .build
  - ${PWD}/CineTracker/Resources

opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

disabled_rules:
  - trailing_whitespace
  - todo
  - line_length

line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length: 2  # cho phép "id", "ok"
  excluded:
    - id
    - ok
    - to
    - vc

# Reporter
reporter: "xcode"
